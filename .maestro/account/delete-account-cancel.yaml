appId: com.mannal.firstride
name: 회원 탈퇴 최종 확인 취소 시 계정 유지
tags:
  - release
  - account
  - privacy
---
# 전제: 전용 테스트 계정으로 로그인되어 있어야 한다.
# PLAIN 계정은 -e E2E_CANCEL_PASSWORD_INPUT='cancel-only'를 전달한다.
# 최종 확인에서 취소하므로 실제 비밀번호는 사용하지 않는다.
- launchApp:
    clearState: false

- extendedWaitUntil:
    visible: "My"
    timeout: 20000
- tapOn: "My"
- extendedWaitUntil:
    visible:
      id: "settings-scroll-view"
    timeout: 10000
- assertVisible: "설정"

- scrollUntilVisible:
    element:
      id: "settings-account-deletion-text"
    direction: DOWN
- tapOn:
    id: "settings-account-deletion-text"

- assertVisible: "계정을 탈퇴하시겠어요?"
- assertVisible: "회원 탈퇴 시 계정 식별 정보와 개인정보가 삭제되며, 진행한 기록은 복구할 수 없습니다."

# 이메일 계정에만 나타나는 비밀번호 입력을 조건부로 처리한다.
- runFlow:
    when:
      visible: "현재 비밀번호를 입력해주세요."
    commands:
      - tapOn: "현재 비밀번호를 입력해주세요."
      - inputText: ${E2E_CANCEL_PASSWORD_INPUT}
      - hideKeyboard

- assertVisible:
    text: "회원 탈퇴 진행"
    enabled: true
- tapOn: "회원 탈퇴 진행"

- assertVisible: "탈퇴한 계정과 개인정보는 복구할 수 없습니다. 계속하시겠습니까?"
- tapOn: "취소"

# 경고가 닫히고 탈퇴 페이지가 유지되며, 설정으로 돌아가도 로그인 정보가 남아야 한다.
- assertNotVisible: "탈퇴한 계정과 개인정보는 복구할 수 없습니다. 계속하시겠습니까?"
- assertVisible: "계정을 탈퇴하시겠어요?"
- tapOn: "뒤로가기"
- assertVisible:
    id: "settings-profile"
- assertVisible:
    id: "settings-account-deletion-text"
- assertNotVisible: "로그인"
